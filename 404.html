<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex">
    <meta name="description" content="Página no encontrada — AWS User Group Manizales">
    <title>404 - Página no encontrada | AWS User Group Manizales</title>
    <link rel="icon" type="image/jpeg" href="/images/channels4_profile.jpg">
    <link rel="apple-touch-icon" href="/images/channels4_profile.jpg">
    <link rel="stylesheet" href="/css/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .error-page {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 4rem 1.5rem;
            background: linear-gradient(135deg, #2d1b4e 0%, #1a0f33 100%);
            color: #fff;
        }
        .error-page__logo {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
            margin-bottom: 2rem;
            box-shadow: 0 8px 32px rgba(124, 58, 237, 0.4);
        }
        .error-page__code {
            color: #ff9900;
            font-size: clamp(6rem, 18vw, 12rem);
            font-weight: 800;
            line-height: 1;
            background: linear-gradient(135deg, #ff9900 0%, #7c3aed 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin: 0;
        }
        .error-page__title {
            font-size: clamp(1.5rem, 4vw, 2.25rem);
            margin: 0.5rem 0 1rem;
        }
        .error-page__text {
            max-width: 540px;
            margin: 0 auto 2.5rem;
            color: rgba(255, 255, 255, 0.8);
            font-size: 1.05rem;
            line-height: 1.6;
        }
        .error-page__actions {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
            justify-content: center;
        }
    </style>
</head>
<body>
    <main class="error-page">
        <img src="/images/channels4_profile.jpg" alt="AWS User Group Manizales" class="error-page__logo">
        <p class="error-page__code">404</p>
        <h1 class="error-page__title">Esta página se perdió en la nube</h1>
        <p class="error-page__text">
            La URL que buscas no existe o fue movida. Pero tranquilo, te ayudamos a volver al inicio o a conectarte con nuestra comunidad.
        </p>
        <div class="error-page__actions">
            <a href="/" class="btn btn--primary"><i class="fas fa-home"></i> Volver al inicio</a>
            <a href="https://linktr.ee/awsugmanizales" target="_blank" rel="noopener noreferrer" class="btn btn--secondary"><i class="fas fa-link"></i> Nuestras redes</a>
        </div>
    </main>
</body>
</html>
