name: CI / Deploy static site

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  terraform:
    name: Validate Terraform
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: terraform
    steps:
      - uses: actions/checkout@v6

      - uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: 1.14.6
          terraform_wrapper: false

      - name: terraform fmt
        run: terraform fmt -check -recursive

      - name: terraform init (no backend)
        run: terraform init -backend=false

      - name: terraform validate
        run: terraform validate -no-color

  html:
    name: Validate HTML
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install html5validator
        run: pip install html5validator

      - name: Validate HTML files
        run: html5validator --root . --match "*.html" --blacklist terraform .github

  javascript:
    name: Validate JavaScript syntax
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Syntax check
        run: node --check js/script.js

  actions:
    name: Lint GitHub Actions workflows
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Run actionlint
        run: |
          bash <(curl -fsSL https://raw.githubusercontent.com/rhysd/actionlint/main/scripts/download-actionlint.bash)
          ./actionlint -color

  detect-changes:
    name: Detect changed paths
    runs-on: ubuntu-latest
    outputs:
      terraform: ${{ steps.filter.outputs.terraform }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            terraform:
              - 'terraform/**'

  terraform-apply:
    name: Apply Terraform infra
    # Solo en merge a main y solo si cambió algo bajo terraform/. El
    # GitHub Environment `production` exige aprobación de un reviewer
    # antes de aplicar (required reviewers: edisoncast, cesarpalacios,
    # loaizajimmy).
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && needs.detect-changes.outputs.terraform == 'true'
    needs: [terraform, html, javascript, actions, detect-changes]
    runs-on: ubuntu-latest
    environment: production
    permissions:
      id-token: write
      contents: read
    concurrency:
      group: terraform-${{ github.ref }}
      cancel-in-progress: false
    defaults:
      run:
        working-directory: terraform
    steps:
      - uses: actions/checkout@v6

      - uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: 1.14.6
          terraform_wrapper: false

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_INFRA_ROLE_ARN }}
          aws-region: us-east-1

      - name: terraform init
        run: terraform init -input=false

      - name: terraform plan
        run: terraform plan -input=false -no-color -out=tfplan

      - name: terraform apply
        run: terraform apply -input=false -no-color tfplan

  deploy:
    name: Deploy to S3 + CloudFront
    # `terraform-apply` puede skipearse (si no cambió terraform/). Un
    # `needs` skipped no bloquea ni skipea el downstream; un `needs`
    # failed sí lo skipea (correcto: no sincronizar assets si el apply de
    # infra falló).
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [terraform, html, javascript, actions, terraform-apply]
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    concurrency:
      group: deploy-${{ github.ref }}
      cancel-in-progress: false
    env:
      AWS_REGION: us-east-1
      S3_BUCKET: ${{ vars.S3_BUCKET || 'web-aws-group-manizales' }}
      CLOUDFRONT_DISTRIBUTION_ID: ${{ vars.CLOUDFRONT_DISTRIBUTION_ID }}

    steps:
      - uses: actions/checkout@v6

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Sync static files to S3
        run: |
          aws s3 sync . "s3://${S3_BUCKET}" \
            --delete \
            --exclude ".git/*" \
            --exclude ".github/*" \
            --exclude "terraform/*" \
            --exclude "*.md" \
            --exclude ".gitignore"

      - name: Fix content-type for AVIF assets
        run: |
          aws s3 cp "s3://${S3_BUCKET}" "s3://${S3_BUCKET}" \
            --recursive \
            --exclude "*" \
            --include "*.avif" \
            --metadata-directive REPLACE \
            --content-type "image/avif"

      - name: Invalidate CloudFront cache
        if: env.CLOUDFRONT_DISTRIBUTION_ID != ''
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "${CLOUDFRONT_DISTRIBUTION_ID}" \
            --paths "/*"

  smoke-test:
    name: Smoke test live site
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [deploy]
    runs-on: ubuntu-latest
    env:
      SITE_URL: ${{ vars.SITE_URL || 'https://awsug.cloud-manizales.com' }}
    steps:
      - name: Verifica home (status 200 y estructura)
        run: |
          status=$(curl -sS -o /dev/null -w "%{http_code}" \
            --max-time 15 --retry 3 --retry-delay 5 "$SITE_URL")
          echo "home → $status"
          [ "$status" = "200" ] || exit 1

          body=$(curl -sS --max-time 15 "$SITE_URL")
          for needle in \
            '<title>AWS User Group Manizales</title>' \
            'id="integrantes"' \
            'id="eventos"' \
            'id="contacto"' \
            'css/styles.css' \
            'js/script.js'
          do
            if ! grep -qF "$needle" <<< "$body"; then
              echo "::error::Falta en la home: $needle"
              exit 1
            fi
          done
          echo "estructura OK"

      - name: Verifica que una ruta inexistente responde 404
        run: |
          url="$SITE_URL/no-existe-$(date +%s)"
          status=$(curl -sS -o /dev/null -w "%{http_code}" \
            --max-time 15 "$url")
          echo "ruta inexistente → $status"
          [ "$status" = "404" ] || exit 1

      - name: Verifica que los assets críticos responden 200
        run: |
          for path in css/styles.css js/script.js images/channels4_profile.jpg 404.html; do
            status=$(curl -sS -o /dev/null -w "%{http_code}" \
              --max-time 10 "$SITE_URL/$path")
            echo "/$path → $status"
            [ "$status" = "200" ] || exit 1
          done
